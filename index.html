<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Frequência de Alunos</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 550px;
            width: 100%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        .cabecalho {
            background: #3d441e;
            padding: 25px 20px;
            text-align: center;
        }
        .logo-escola {
            max-width: 100px;
            height: auto;
            margin-bottom: 15px;
            background: white;
            border-radius: 12px;
            padding: 8px;
            display: inline-block;
        }
        .cabecalho h1 {
            color: white;
            margin: 0;
            font-size: 1.5rem;
            font-weight: 500;
        }
        .cabecalho p {
            color: rgba(255,255,255,0.8);
            margin: 5px 0 0;
            font-size: 0.85rem;
        }
        .conteudo {
            padding: 25px;
        }
        .campo-leitura {
            margin-bottom: 25px;
        }
        .campo-leitura label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #3d441e;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .campo-leitura input {
            width: 100%;
            padding: 14px 16px;
            font-size: 18px;
            font-family: monospace;
            text-align: center;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            transition: all 0.3s;
            background: #fafafa;
        }
        .campo-leitura input:focus {
            outline: none;
            border-color: #3d441e;
            background: white;
        }
        .botoes-acao {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }
        button {
            flex: 1;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        button.entrada {
            background: #4CAF50;
            color: white;
        }
        button.entrada:hover {
            background: #45a049;
            transform: translateY(-2px);
        }
        button.saida {
            background: #f44336;
            color: white;
        }
        button.saida:hover {
            background: #da190b;
            transform: translateY(-2px);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .card-aluno {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            display: none;
            border-left: 5px solid #3d441e;
            text-align: center;
        }
        .foto-aluno {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 15px;
            border: 3px solid #3d441e;
            background: white;
        }
        .nome-aluno {
            font-size: 1.3rem;
            font-weight: 600;
            color: #2c3e2b;
            margin: 5px 0;
        }
        .turma-aluno {
            color: #666;
            font-size: 0.9rem;
            margin: 5px 0;
        }
        .id-aluno {
            color: #888;
            font-size: 0.8rem;
            font-family: monospace;
        }
        .status-registro {
            background: #f0f0f0;
            border-radius: 12px;
            padding: 12px;
            font-size: 0.85rem;
            text-align: center;
            color: #555;
            margin-top: 15px;
        }
        .mensagem {
            padding: 12px;
            border-radius: 12px;
            margin: 15px 0;
            font-weight: 500;
            text-align: center;
        }
        .mensagem.sucesso {
            background: #d4edda;
            color: #155724;
        }
        .mensagem.erro {
            background: #f8d7da;
            color: #721c24;
        }
        .mensagem.info {
            background: #d1ecf1;
            color: #0c5460;
        }
        .debug-toggle {
            background: none;
            border: none;
            color: #999;
            font-size: 0.7rem;
            padding: 8px;
            margin-top: 10px;
            width: auto;
            flex: none;
        }
        .debug-box {
            background: #f0f0f0;
            padding: 12px;
            margin-top: 15px;
            font-size: 0.7rem;
            font-family: monospace;
            max-height: 150px;
            overflow: auto;
            border-radius: 10px;
            display: none;
            text-align: left;
        }
        .debug-box.show {
            display: block;
        }
        footer {
            text-align: center;
            padding: 15px;
            font-size: 0.7rem;
            color: #aaa;
            border-top: 1px solid #eee;
        }
        @media (max-width: 480px) {
            .conteudo {
                padding: 20px;
            }
            .botoes-acao {
                gap: 10px;
            }
            button {
                padding: 12px;
                font-size: 0.9rem;
            }
            .foto-aluno {
                width: 80px;
                height: 80px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="cabecalho">
            <img src="logo1.jpg" alt="Logo da Escola" class="logo-escola" onerror="this.src='https://placehold.co/100x100/3d441e/white?text=Logo'">
            <h1> Controle de Frequência</h1>
            <p>Registro de entrada e saída de alunos</p>
        </div>
        
        <div class="conteudo">
            <div class="campo-leitura">
                <label>🔍 CÓDIGO DO ALUNO</label>
                <input type="text" id="codigoBarras" placeholder="Leia o código de barras ou digite o ID" autofocus>
            </div>
            
            <div class="botoes-acao">
                <button id="btnEntrada" class="entrada" disabled>📥 ENTRADA</button>
                <button id="btnSaida" class="saida" disabled>📤 SAÍDA</button>
            </div>
            
            <div id="cardAluno" class="card-aluno">
                <img id="fotoAluno" class="foto-aluno" src="" alt="Foto">
                <div class="nome-aluno" id="nomeAluno"></div>
                <div class="turma-aluno" id="turmaAluno"></div>
                <div class="id-aluno" id="idAluno"></div>
            </div>
            
            <div id="mensagem" class="mensagem"></div>
            <div id="statusRegistro" class="status-registro"></div>
            
            <button class="debug-toggle" onclick="toggleDebug()">🔧 Mostrar Debug</button>
            <div id="debugBox" class="debug-box">
                <strong>🔍 LOG DE DEBUG:</strong><br>
                <div id="debugContent"></div>
            </div>
        </div>
        
        <footer>
           Sistema de Frequência  • CEMSTIAC
        </footer>
    </div>

    <script>
        // ============================================
        // CONFIGURAÇÃO - CORRIGIDA
        // ============================================
        const PLANILHA_ID = '1UzzuE4kERhznDw76NuAaHjXxMbWYqNXshLle5ZZ4eHo';
        const NOME_ABA = 'Aluno';
        const REPOSITORIO_FOTOS = 'https://raw.githubusercontent.com/emcemstiac-png/frequenciaalunos/main/Alunos/';
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzfShYvpYqOqUOocuCQw-GA4e_lfSHgSJcsV0p5R3JwKCt3ez2he8cIZD2uB3k-AUPH/exec';
        
        // Estado
        let alunoAtual = null;
        let dadosPlanilha = [];

        // Elementos DOM
        const inputCodigo = document.getElementById('codigoBarras');
        const btnEntrada = document.getElementById('btnEntrada');
        const btnSaida = document.getElementById('btnSaida');
        const cardAluno = document.getElementById('cardAluno');
        const fotoAluno = document.getElementById('fotoAluno');
        const nomeAluno = document.getElementById('nomeAluno');
        const turmaAluno = document.getElementById('turmaAluno');
        const idAlunoElem = document.getElementById('idAluno');
        const mensagemDiv = document.getElementById('mensagem');
        const statusRegistro = document.getElementById('statusRegistro');

        function addDebug(msg, isError = false) {
            const debugContent = document.getElementById('debugContent');
            const time = new Date().toLocaleTimeString();
            debugContent.innerHTML += `<div style="${isError ? 'color: red;' : ''}">[${time}] ${msg}</div>`;
            console.log(msg);
        }

        function toggleDebug() {
            const box = document.getElementById('debugBox');
            box.classList.toggle('show');
        }

        function mostrarMensagem(texto, tipo) {
            mensagemDiv.textContent = texto;
            mensagemDiv.className = `mensagem ${tipo}`;
            setTimeout(() => {
                mensagemDiv.className = 'mensagem';
                mensagemDiv.textContent = '';
            }, 4000);
        }

        // Carregar todos os alunos da planilha
        async function carregarAlunos() {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${PLANILHA_ID}/gviz/tq?tqx=out:csv&sheet=${NOME_ABA}`;
                addDebug(`📡 Buscando dados...`);
                
                const response = await fetch(url);
                const csvText = await response.text();
                
                const linhas = csvText.split('\n');
                if (linhas.length < 2) {
                    addDebug(`❌ Nenhum dado encontrado!`, true);
                    return false;
                }
                
                const cabecalhos = linhas[0].split(',').map(h => h.replace(/"/g, '').trim().toLowerCase());
                addDebug(` Cabeçalhos: ${cabecalhos.join(', ')}`);
                
                dadosPlanilha = [];
                for (let i = 1; i < linhas.length; i++) {
                    if (!linhas[i].trim()) continue;
                    const valores = linhas[i].split(',').map(v => v.replace(/"/g, '').trim());
                    const aluno = {};
                    cabecalhos.forEach((cab, idx) => aluno[cab] = valores[idx]);
                    if (aluno.id && aluno.id.trim()) {
                        dadosPlanilha.push(aluno);
                    }
                }
                
                addDebug(`✅ Carregados ${dadosPlanilha.length} alunos`);
                addDebug(`📊 IDs: ${dadosPlanilha.map(a => a.id).join(', ')}`);
                return true;
            } catch (error) {
                addDebug(`❌ Erro: ${error.message}`, true);
                return false;
            }
        }

        // Buscar aluno por ID
        function buscarAlunoPorId(id) {
            addDebug(`🔍 Buscando ID: "${id}"`);
            const aluno = dadosPlanilha.find(a => String(a.id).trim() === String(id).trim());
            if (aluno) {
                addDebug(`✅ Aluno encontrado: ${aluno.nome}`);
            } else {
                addDebug(`❌ Aluno NÃO encontrado`, true);
            }
            return aluno;
        }

        // Mostrar informações do aluno
        function mostrarAluno(aluno) {
            alunoAtual = aluno;
            
            const fotoUrl = `${REPOSITORIO_FOTOS}${aluno.id}.jpg`;
            addDebug(`📸 Buscando foto: ${fotoUrl}`);
            
            fotoAluno.src = fotoUrl;
            fotoAluno.onerror = function() {
                addDebug(`⚠️ Foto não encontrada: ${fotoUrl}`);
                this.src = 'https://placehold.co/200x200/ccc/666?text=Sem+foto';
            };
            
            nomeAluno.textContent = aluno.nome;
            turmaAluno.textContent = `Turma: ${aluno.turma || 'Não informada'}`;
            idAlunoElem.textContent = `ID: ${aluno.id}`;
            
            cardAluno.style.display = 'block';
            btnEntrada.disabled = false;
            btnSaida.disabled = false;
            statusRegistro.innerHTML = `⚠️ Aluno identificado. Selecione ENTRADA ou SAÍDA.`;
            
            addDebug(`👤 Aluno carregado: ${aluno.nome} (ID: ${aluno.id})`);
        }

        function limparAluno() {
            alunoAtual = null;
            cardAluno.style.display = 'none';
            btnEntrada.disabled = true;
            btnSaida.disabled = true;
            statusRegistro.innerHTML = '';
            fotoAluno.src = '';
            nomeAluno.textContent = '';
            turmaAluno.textContent = '';
            idAlunoElem.textContent = '';
        }

        // Registrar no Apps Script
        async function registrarAcao(tipo) {
            if (!alunoAtual) {
                mostrarMensagem('Nenhum aluno selecionado. Leia um código de barras primeiro.', 'erro');
                return;
            }
            
            addDebug(`📤 Registrando ${tipo} para ${alunoAtual.nome}`);
            btnEntrada.disabled = true;
            btnSaida.disabled = true;
            statusRegistro.innerHTML = `⏳ Registrando ${tipo}...`;
            
            try {
                const agora = new Date();
                const dados = {
                    id: alunoAtual.id,
                    nome: alunoAtual.nome,
                    turma: alunoAtual.turma || '',
                    acao: tipo,
                    data: agora.toLocaleDateString('pt-BR'),
                    hora: agora.toLocaleTimeString('pt-BR'),
                    timestamp: agora.toISOString()
                };
                
                await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });
                
                addDebug(`✅ Registro enviado!`);
                mostrarMensagem(`✅ ${tipo === 'entrada' ? 'ENTRADA' : 'SAÍDA'} registrada para ${alunoAtual.nome}!`, 'sucesso');
                statusRegistro.innerHTML = `✅ ${tipo === 'entrada' ? 'ENTRADA' : 'SAÍDA'} registrada às ${agora.toLocaleTimeString('pt-BR')}`;
                
                setTimeout(() => {
                    limparAluno();
                    inputCodigo.value = '';
                    inputCodigo.focus();
                }, 2000);
                
            } catch (error) {
                addDebug(`❌ Erro: ${error.message}`, true);
                mostrarMensagem('Erro ao registrar. Tente novamente.', 'erro');
                statusRegistro.innerHTML = '❌ Erro no registro. Tente novamente.';
                btnEntrada.disabled = false;
                btnSaida.disabled = false;
            }
        }

        // Processar código lido
        async function processarCodigo(codigo) {
            if (!codigo || codigo.trim() === '') return;
            
            addDebug(`📷 Código lido: "${codigo}"`);
            inputCodigo.value = codigo;
            
            if (alunoAtual && String(alunoAtual.id) === String(codigo)) {
                addDebug(`⚠️ Mesmo ID já carregado`);
                return;
            }
            
            limparAluno();
            
            const aluno = buscarAlunoPorId(codigo);
            
            if (!aluno) {
                mostrarMensagem(`❌ Aluno com ID "${codigo}" não encontrado!`, 'erro');
                addDebug(`❌ ID não encontrado`, true);
                inputCodigo.value = '';
                inputCodigo.focus();
                return;
            }
            
            mostrarAluno(aluno);
            mostrarMensagem(`📋 Aluno identificado: ${aluno.nome}. Selecione ENTRADA ou SAÍDA.`, 'info');
        }

        // Eventos
        inputCodigo.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                processarCodigo(this.value);
            }
        });
        
        btnEntrada.addEventListener('click', () => registrarAcao('entrada'));
        btnSaida.addEventListener('click', () => registrarAcao('saida'));

        // Inicializar
        async function init() {
            addDebug('🚀 Sistema de frequência iniciado');
            addDebug(`📁 Repositório: ${REPOSITORIO_FOTOS}`);
            const carregou = await carregarAlunos();
            if (!carregou) {
                addDebug('⚠️ Verifique a planilha!', true);
                mostrarMensagem('Erro ao carregar dados. Verifique o console.', 'erro');
            } else {
                addDebug(`✅ Pronto! Aguardando leitura de código.`);
                mostrarMensagem('✅ Sistema pronto! Leia o código de barras do aluno.', 'info');
            }
        }
        
        init();
    </script>
</body>
</html>
