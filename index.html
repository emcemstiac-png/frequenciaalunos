<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequência de Alunos</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
            background: #f5f5f5;
        }
        h1 {
            color: #3d441e;
            margin-bottom: 30px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        input {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            text-align: center;
            border: 2px solid #ddd;
            border-radius: 10px;
            margin-bottom: 20px;
            font-family: monospace;
            letter-spacing: 1px;
        }
        input:focus {
            outline: none;
            border-color: #3d441e;
        }
        .botoes-acao {
            display: flex;
            gap: 15px;
            margin: 20px 0;
        }
        button {
            flex: 1;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        button.entrada {
            background: #4CAF50;
            color: white;
        }
        button.entrada:hover {
            background: #45a049;
            transform: scale(1.02);
        }
        button.saida {
            background: #f44336;
            color: white;
        }
        button.saida:hover {
            background: #da190b;
            transform: scale(1.02);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .info-aluno {
            background: #f9f9f9;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            display: none;
            border-left: 5px solid #3d441e;
        }
        .info-aluno img {
            max-width: 120px;
            border-radius: 50%;
            margin-bottom: 10px;
        }
        .info-aluno h3 {
            margin: 10px 0;
            color: #3d441e;
        }
        .info-aluno p {
            margin: 5px 0;
            color: #666;
        }
        .mensagem {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
        }
        .mensagem.sucesso {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .mensagem.erro {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .mensagem.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        .debug-box {
            background: #f0f0f0;
            padding: 15px;
            margin-top: 20px;
            text-align: left;
            font-size: 11px;
            font-family: monospace;
            max-height: 200px;
            overflow: auto;
            border-radius: 8px;
            display: none;
        }
        .debug-box.show {
            display: block;
        }
        button.debug-toggle {
            background: #666;
            font-size: 12px;
            padding: 5px 10px;
            margin-top: 10px;
            width: auto;
        }
        .status-registro {
            font-size: 14px;
            color: #666;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 Controle de Frequência</h1>
        
        <div>
            <input type="text" id="codigoBarras" placeholder="🔍 Leia o código de barras ou digite o ID" autofocus>
        </div>
        
        <div class="botoes-acao">
            <button id="btnEntrada" class="entrada" disabled>📥 ENTRADA</button>
            <button id="btnSaida" class="saida" disabled>📤 SAÍDA</button>
        </div>
        
        <div id="infoAluno" class="info-aluno">
            <img id="fotoAluno" src="" alt="Foto">
            <h3 id="nomeAluno"></h3>
            <p id="turmaAluno"></p>
            <p id="idAluno"></p>
        </div>
        
        <div id="mensagem" class="mensagem"></div>
        <div id="statusRegistro" class="status-registro"></div>
        
        <button class="debug-toggle" onclick="toggleDebug()">🔧 Mostrar Debug</button>
        <div id="debugBox" class="debug-box">
            <strong>🔍 LOG DE DEBUG:</strong><br>
            <div id="debugContent"></div>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURAÇÃO
        // ============================================
        const PLANILHA_ID = '1UzzuE4kERhznDw76NuAaHjXxMbWYqNXshLle5ZZ4eHo';
        const NOME_ABA = 'Aluno';  // Nome da aba com os alunos
        const REPOSITORIO_FOTOS = 'https://raw.githubusercontent.com/seu-usuario/frequenciaalunos/main/alunos/';
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzfShYvpYqOqUOocuCQw-GA4e_lfSHgSJcsV0p5R3JwKCt3ez2he8cIZD2uB3k-AUPH/exec';
        
        // Estado
        let alunoAtual = null;
        let dadosPlanilha = [];
        let ultimoIdLido = null;

        // Elementos DOM
        const inputCodigo = document.getElementById('codigoBarras');
        const btnEntrada = document.getElementById('btnEntrada');
        const btnSaida = document.getElementById('btnSaida');
        const infoAluno = document.getElementById('infoAluno');
        const fotoAluno = document.getElementById('fotoAluno');
        const nomeAluno = document.getElementById('nomeAluno');
        const turmaAluno = document.getElementById('turmaAluno');
        const idAlunoElem = document.getElementById('idAluno');
        const mensagemDiv = document.getElementById('mensagem');
        const statusRegistro = document.getElementById('statusRegistro');

        function addDebug(msg, isError = false) {
            const debugContent = document.getElementById('debugContent');
            const time = new Date().toLocaleTimeString();
            const className = isError ? 'color: red;' : '';
            debugContent.innerHTML += `<div style="${className}">[${time}] ${msg}</div>`;
            console.log(msg);
        }

        function toggleDebug() {
            const box = document.getElementById('debugBox');
            box.classList.toggle('show');
        }

        function mostrarMensagem(texto, tipo) {
            mensagemDiv.textContent = texto;
            mensagemDiv.className = `mensagem ${tipo}`;
            setTimeout(() => {
                mensagemDiv.className = 'mensagem';
                mensagemDiv.textContent = '';
            }, 4000);
        }

        // Carregar todos os alunos da planilha
        async function carregarAlunos() {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${PLANILHA_ID}/gviz/tq?tqx=out:csv&sheet=${NOME_ABA}`;
                addDebug(`📡 Buscando dados em: ${url}`);
                
                const response = await fetch(url);
                const csvText = await response.text();
                
                const linhas = csvText.split('\n');
                if (linhas.length < 2) {
                    addDebug(`❌ Nenhum dado encontrado!`, true);
                    return false;
                }
                
                const cabecalhos = linhas[0].split(',').map(h => h.replace(/"/g, '').trim().toLowerCase());
                addDebug(`📋 Cabeçalhos: ${cabecalhos.join(', ')}`);
                
                dadosPlanilha = [];
                for (let i = 1; i < linhas.length; i++) {
                    if (!linhas[i].trim()) continue;
                    const valores = linhas[i].split(',').map(v => v.replace(/"/g, '').trim());
                    const aluno = {};
                    cabecalhos.forEach((cab, idx) => aluno[cab] = valores[idx]);
                    dadosPlanilha.push(aluno);
                }
                
                addDebug(`✅ Carregados ${dadosPlanilha.length} alunos`);
                addDebug(`📊 IDs: ${dadosPlanilha.map(a => a.id).join(', ')}`);
                return true;
            } catch (error) {
                addDebug(`❌ Erro: ${error.message}`, true);
                return false;
            }
        }

        // Buscar aluno por ID
        function buscarAlunoPorId(id) {
            addDebug(`🔍 Buscando ID: "${id}"`);
            const aluno = dadosPlanilha.find(a => String(a.id).trim() === String(id).trim());
            if (aluno) {
                addDebug(`✅ Aluno encontrado: ${aluno.nome}`);
            } else {
                addDebug(`❌ Aluno NÃO encontrado`, true);
            }
            return aluno;
        }

        // Mostrar informações do aluno e ativar botões
        function mostrarAluno(aluno) {
            alunoAtual = aluno;
            
            const fotoUrl = `${REPOSITORIO_FOTOS}${aluno.id}.jpg`;
            fotoAluno.src = fotoUrl;
            fotoAluno.onerror = function() {
                this.src = 'https://placehold.co/120x120/ccc/666?text=Sem+foto';
            };
            nomeAluno.textContent = aluno.nome;
            turmaAluno.textContent = `Turma: ${aluno.turma || 'Não informada'}`;
            idAlunoElem.textContent = `ID: ${aluno.id}`;
            
            infoAluno.style.display = 'block';
            
            // Ativar botões
            btnEntrada.disabled = false;
            btnSaida.disabled = false;
            
            statusRegistro.innerHTML = `⚠️ Aluno ${aluno.nome} identificado. Selecione ENTRADA ou SAÍDA.`;
            
            addDebug(`👤 Aluno carregado: ${aluno.nome}`);
        }

        function limparAluno() {
            alunoAtual = null;
            infoAluno.style.display = 'none';
            btnEntrada.disabled = true;
            btnSaida.disabled = true;
            statusRegistro.innerHTML = '';
            fotoAluno.src = '';
            nomeAluno.textContent = '';
            turmaAluno.textContent = '';
            idAlunoElem.textContent = '';
        }

        // Registrar no Apps Script
        async function registrarAcao(tipo) {
            if (!alunoAtual) {
                mostrarMensagem('Nenhum aluno selecionado. Leia um código de barras primeiro.', 'erro');
                return;
            }
            
            addDebug(`📤 Registrando ${tipo} para ${alunoAtual.nome} (ID: ${alunoAtual.id})`);
            
            // Desabilitar botões durante o registro
            btnEntrada.disabled = true;
            btnSaida.disabled = true;
            statusRegistro.innerHTML = `⏳ Registrando ${tipo}...`;
            
            try {
                const agora = new Date();
                const dados = {
                    id: alunoAtual.id,
                    nome: alunoAtual.nome,
                    turma: alunoAtual.turma || '',
                    acao: tipo,
                    data: agora.toLocaleDateString('pt-BR'),
                    hora: agora.toLocaleTimeString('pt-BR'),
                    timestamp: agora.toISOString()
                };
                
                addDebug(`📦 Dados a enviar: ${JSON.stringify(dados)}`);
                
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });
                
                addDebug(`✅ Registro de ${tipo} enviado com sucesso!`);
                
                mostrarMensagem(`✅ ${tipo === 'entrada' ? 'ENTRADA' : 'SAÍDA'} registrada com sucesso para ${alunoAtual.nome}!`, 'sucesso');
                statusRegistro.innerHTML = `✅ ${tipo === 'entrada' ? 'ENTRADA' : 'SAÍDA'} registrada em ${agora.toLocaleTimeString('pt-BR')}`;
                
                // Limpar após registro bem-sucedido
                setTimeout(() => {
                    limparAluno();
                    inputCodigo.value = '';
                    inputCodigo.focus();
                }, 2000);
                
            } catch (error) {
                addDebug(`❌ Erro: ${error.message}`, true);
                mostrarMensagem('Erro ao registrar. Tente novamente.', 'erro');
                statusRegistro.innerHTML = '❌ Erro no registro. Tente novamente.';
                
                // Reativar botões em caso de erro
                btnEntrada.disabled = false;
                btnSaida.disabled = false;
            }
        }

        // Processar código de barras lido
        async function processarCodigo(codigo) {
            if (!codigo || codigo.trim() === '') return;
            
            addDebug(`📷 Código lido: "${codigo}"`);
            inputCodigo.value = codigo;
            
            // Se for o mesmo ID, não faz nada
            if (alunoAtual && String(alunoAtual.id) === String(codigo)) {
                addDebug(`⚠️ Mesmo ID já está carregado`);
                return;
            }
            
            // Limpar aluno anterior
            limparAluno();
            
            // Buscar novo aluno
            const aluno = buscarAlunoPorId(codigo);
            
            if (!aluno) {
                mostrarMensagem(`❌ Aluno com ID "${codigo}" não encontrado!`, 'erro');
                addDebug(`❌ ID não encontrado na planilha`, true);
                inputCodigo.value = '';
                inputCodigo.focus();
                return;
            }
            
            mostrarAluno(aluno);
            mostrarMensagem(`📋 Aluno identificado: ${aluno.nome}. Selecione ENTRADA ou SAÍDA.`, 'info');
        }

        // Eventos
        inputCodigo.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                processarCodigo(this.value);
            }
        });
        
        btnEntrada.addEventListener('click', () => registrarAcao('entrada'));
        btnSaida.addEventListener('click', () => registrarAcao('saida'));

        // Inicializar
        async function init() {
            addDebug('🚀 Sistema de frequência iniciado...');
            addDebug(`📊 Planilha ID: ${PLANILHA_ID}`);
            addDebug(`📄 Aba: ${NOME_ABA}`);
            addDebug(`🤖 Apps Script: ${APPS_SCRIPT_URL.substring(0, 60)}...`);
            
            const carregou = await carregarAlunos();
            if (!carregou) {
                addDebug('⚠️ Verifique se a planilha está publicada e a aba existe!', true);
                mostrarMensagem('Erro ao carregar dados da planilha. Verifique o console.', 'erro');
            } else {
                addDebug(`✅ Sistema pronto! Aguardando leitura de código de barras.`);
                mostrarMensagem('✅ Sistema pronto! Leia o código de barras do aluno.', 'info');
            }
        }
        
        init();
    </script>
</body>
</html>
